services:
  php:
    build:
      context: ./backendphp
      dockerfile: Dockerfile
    container_name: aplis_php
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: aplis_test
    expose:
      - "9000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - aplis_network
    command: php-fpm

  nodejs:
    build:
      context: ./backendjs
      dockerfile: Dockerfile
    container_name: aplis_nodejs
    volumes:
      - ./backendjs:/home/node/app
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: aplis_test
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - aplis_network
    working_dir: /home/node/app

  nginx:
    image: nginx:latest
    container_name: aplis_nginx
    volumes:
      - ./backendphp:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9000:80"
    depends_on:
      - php
    networks:
      - aplis_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql:
    image: mysql:latest
    container_name: aplis_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: aplis_test
      MYSQL_USER: aplis_user
      MYSQL_PASSWORD: aplis_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - aplis_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: aplis_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - aplis_network

volumes:
  mysql_data:

networks:
  aplis_network:
    driver: bridge