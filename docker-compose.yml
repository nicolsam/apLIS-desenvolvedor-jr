version: '3.8'

services:
  php:
    image: php:8.3-fpm
    container_name: aplis_php
    volumes:
      - ./backendphp:/var/www/html
    expose:
      - "9000"
    depends_on:
      - mysql
    networks:
      - aplis_network

  nginx:
    image: nginx:latest
    container_name: aplis_nginx
    volumes:
      - ./backendphp:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9000:80"
    depends_on:
      - php
    networks:
      - aplis_network

  mysql:
    image: mysql:latest
    container_name: aplis_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: aplis_test
      MYSQL_USER: aplis_user
      MYSQL_PASSWORD: aplis_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - aplis_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: aplis_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - aplis_network

volumes:
  mysql_data:

networks:
  aplis_network:
    driver: bridge