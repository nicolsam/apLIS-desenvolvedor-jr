services:
  php:
    build:
      context: ./backendphp
      dockerfile: Dockerfile
    container_name: aplis_php
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    expose:
      - "9000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - aplis_network
    command: php-fpm

  nodejs:
    build:
      context: ./backendjs
      dockerfile: Dockerfile
    container_name: aplis_nodejs
    volumes:
      - ./backendjs:/home/node/app
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    ports:
      - "${NODE_PORT}:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - aplis_network
    working_dir: /home/node/app

  nginx:
    image: nginx:latest
    container_name: aplis_nginx
    volumes:
      - ./backendphp:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - php
    networks:
      - aplis_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql:
    image: mysql:latest
    container_name: aplis_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - aplis_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: aplis_phpmyadmin
    environment:
      PMA_HOST: ${DB_HOST}
      PMA_PORT: ${DB_PORT}
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT}:80"
    depends_on:
      - mysql
    networks:
      - aplis_network

volumes:
  mysql_data:

networks:
  aplis_network:
    driver: bridge